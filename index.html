<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body data-theme="light">
  <button id="theme-toggle">Dark Mode</button>
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div class="lotto-numbers"></div>
    <button id="generator-btn">Generate Numbers</button>
    <div class="contact-section">
      <hr>
      <h3>Partnership Inquiry</h3>
      <form action="https://formspree.io/f/xvzdbvyp" method="POST" id="contact-form">
        <div class="form-group">
          <input type="email" name="email" placeholder="Your Email Address" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="Your Message" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Inquiry</button>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
